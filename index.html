<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior Bazán</title>
<style>
  :root{
    --bg:#0f1115;
    --card:#171a21;
    --card2:#1e222b;
    --accent:#4f8cff;
    --accent2:#37d67a;
    --text:#e8eaed;
    --muted:#8b909c;
    --danger:#ff5c5c;
    --border:#2a2f3a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  header{
    padding:28px 20px 18px;
    text-align:center;
  }
  header h1{
    margin:0;
    font-size:26px;
    font-weight:700;
    letter-spacing:.3px;
  }
  header p{
    margin:6px 0 0;
    color:var(--muted);
    font-size:14px;
  }
  .container{
    max-width:520px;
    margin:0 auto;
    padding:0 16px 40px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
  }
  .field{
    margin-bottom:16px;
  }
  label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:6px;
  }
  input[type="number"], input[type="text"], input[type="date"]{
    width:100%;
    padding:12px 14px;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-size:16px;
    outline:none;
  }
  input:focus{
    border-color:var(--accent);
  }
  .metodos{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .metodo-btn{
    padding:12px 6px;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--muted);
    text-align:center;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    transition:.15s;
  }
  .metodo-btn.active{
    border-color:var(--accent);
    color:var(--text);
    background:rgba(79,140,255,.12);
  }
  .metodo-btn .emoji{
    display:block;
    font-size:20px;
    margin-bottom:4px;
  }
  button.submit{
    width:100%;
    padding:14px;
    background:var(--accent);
    border:none;
    border-radius:10px;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
  }
  button.submit:active{
    opacity:.85;
  }
  .resumen{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-bottom:20px;
  }
  .resumen .box{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
  }
  .resumen .box .label{
    font-size:12px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .resumen .box .valor{
    font-size:18px;
    font-weight:700;
  }
  .lista-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .lista-title h2{
    font-size:16px;
    margin:0;
  }
  .lista-title .clear{
    font-size:12px;
    color:var(--danger);
    cursor:pointer;
  }
  .viaje{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .viaje-info{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .viaje-icon{
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--card2);
    font-size:16px;
  }
  .viaje-datos .metodo{
    font-size:13px;
    font-weight:600;
  }
  .viaje-datos .fecha{
    font-size:11px;
    color:var(--muted);
  }
  .viaje-monto{
    font-weight:700;
    font-size:15px;
  }
  .viaje-del{
    color:var(--muted);
    cursor:pointer;
    font-size:16px;
    margin-left:10px;
  }
  .vacio{
    text-align:center;
    color:var(--muted);
    font-size:14px;
    padding:30px 0;
  }
  .tabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:20px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:6px;
  }
  .tab-btn{
    text-align:center;
    padding:10px 6px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
  }
  .tab-btn.active{
    background:var(--accent);
    color:#fff;
  }
  .tab-panel{
    display:none;
  }
  .tab-panel.active{
    display:block;
  }
  .export-btn{
    width:100%;
    padding:13px;
    background:var(--accent2);
    border:none;
    border-radius:10px;
    color:#0f1115;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .export-btn:active{
    opacity:.85;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <h1>Junior Bazán</h1>
  <p>Registro de viajes</p>
</header>

<div class="container">

  <div class="resumen">
    <div class="box">
      <div class="label">Total acumulado</div>
      <div class="valor" id="totalGeneral">₲ 0</div>
    </div>
    <div class="box">
      <div class="label">Viajes registrados</div>
      <div class="valor" id="totalViajes">0</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab-btn active" data-tab="nuevo">➕ Nuevo viaje</div>
    <div class="tab-btn" data-tab="historial">📋 Historial</div>
  </div>

  <div class="tab-panel active" id="panel-nuevo">
    <div class="card">
      <form id="formViaje">
        <div class="field">
          <label for="monto">Monto (₲)</label>
          <input type="number" id="monto" placeholder="Ej: 15000" min="0" step="1" required>
        </div>

        <div class="field">
          <label for="descripcion">Descripción (opcional)</label>
          <input type="text" id="descripcion" placeholder="Ej: Viaje a San Lorenzo">
        </div>

        <div class="field">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" required>
        </div>

        <div class="field">
          <label>Método de pago</label>
          <div class="metodos">
            <div class="metodo-btn active" data-metodo="efectivo">
              <span class="emoji">💵</span>Efectivo
            </div>
            <div class="metodo-btn" data-metodo="tarjeta">
              <span class="emoji">💳</span>Tarjeta
            </div>
            <div class="metodo-btn" data-metodo="transferencia">
              <span class="emoji">🔁</span>Transferencia
            </div>
          </div>
        </div>

        <button type="submit" class="submit">Agregar viaje</button>
      </form>
    </div>
  </div>

  <div class="tab-panel" id="panel-historial">
    <button class="export-btn" id="exportarExcel">⬇ Exportar a Excel</button>

    <div class="lista-title">
      <h2>Historial</h2>
      <span class="clear" id="borrarTodo">Borrar todo</span>
    </div>

    <div id="listaViajes"></div>
  </div>

</div>

<script>
  // ⚠️ Pegá acá la URL de tu implementación de Apps Script (termina en /exec)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycwc7_pY7BDL5Cd4pnZ_P2faBshkWs17CRBntFhu7clXAKUpgPfR3Ooi1JHuytDqE0/exec';

  let viajes = [];
  let metodoSeleccionado = 'efectivo';
  let cargando = false;

  const emojis = { efectivo: '💵', tarjeta: '💳', transferencia: '🔁' };
  const nombres = { efectivo: 'Efectivo', tarjeta: 'Tarjeta', transferencia: 'Transferencia' };

  const form = document.getElementById('formViaje');
  const listaViajes = document.getElementById('listaViajes');
  const totalGeneral = document.getElementById('totalGeneral');
  const totalViajesEl = document.getElementById('totalViajes');
  const fechaInput = document.getElementById('fecha');

  // Fecha de hoy por defecto
  fechaInput.valueAsDate = new Date();

  document.querySelectorAll('.metodo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.metodo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      metodoSeleccionado = btn.dataset.metodo;
    });
  });

  function formatoGs(num) {
    return '₲ ' + Number(num).toLocaleString('es-PY');
  }

  function formatoFecha(f) {
    const d = new Date(f + 'T00:00:00');
    return d.toLocaleDateString('es-PY', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  async function cargarViajes() {
    if (SCRIPT_URL.includes('PEGA_AQUI')) {
      render();
      return;
    }
    cargando = true;
    render();
    try {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      viajes = (data.viajes || []).map(v => ({
        id: v.id,
        monto: Number(v.monto),
        descripcion: v.descripcion,
        fecha: v.fecha,
        metodo: v.metodo
      }));
    } catch (err) {
      console.error('No se pudo cargar desde Google Sheets:', err);
    }
    cargando = false;
    render();
  }

  function enviarASheets(body) {
    if (SCRIPT_URL.includes('PEGA_AQUI')) return;
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    }).catch(err => console.error('Error al guardar en Google Sheets:', err));
  }

  function render() {
    if (cargando) {
      listaViajes.innerHTML = '<div class="vacio">Cargando desde Google Sheets...</div>';
    } else if (viajes.length === 0) {
      listaViajes.innerHTML = '<div class="vacio">Todavía no cargaste ningún viaje</div>';
    } else {
      listaViajes.innerHTML = viajes
        .slice()
        .reverse()
        .map(v => `
          <div class="viaje">
            <div class="viaje-info">
              <div class="viaje-icon">${emojis[v.metodo]}</div>
              <div class="viaje-datos">
                <div class="metodo">${v.descripcion || nombres[v.metodo]}</div>
                <div class="fecha">${nombres[v.metodo]} · ${formatoFecha(v.fecha)}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;">
              <div class="viaje-monto">${formatoGs(v.monto)}</div>
              <div class="viaje-del" onclick="eliminarViaje(${v.id})">✕</div>
            </div>
          </div>
        `).join('');
    }

    const total = viajes.reduce((acc, v) => acc + Number(v.monto), 0);
    totalGeneral.textContent = formatoGs(total);
    totalViajesEl.textContent = viajes.length;
  }

  function eliminarViaje(id) {
    viajes = viajes.filter(v => v.id !== id);
    render();
    enviarASheets({ action: 'eliminar', id });
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Exportar a Excel
  document.getElementById('exportarExcel').addEventListener('click', () => {
    if (viajes.length === 0) {
      alert('No hay viajes para exportar todavía.');
      return;
    }

    const datos = viajes
      .slice()
      .sort((a, b) => new Date(a.fecha) - new Date(b.fecha))
      .map(v => ({
        Fecha: formatoFecha(v.fecha),
        Descripción: v.descripcion || '-',
        'Método de pago': nombres[v.metodo],
        'Monto (₲)': Number(v.monto)
      }));

    const total = viajes.reduce((acc, v) => acc + Number(v.monto), 0);
    datos.push({ Fecha: '', Descripción: '', 'Método de pago': 'TOTAL', 'Monto (₲)': total });

    const hoja = XLSX.utils.json_to_sheet(datos);
    hoja['!cols'] = [{ wch: 12 }, { wch: 28 }, { wch: 16 }, { wch: 14 }];

    const libro = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(libro, hoja, 'Viajes');

    const hoy = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(libro, `viajes_junior_bazan_${hoy}.xlsx`);
  });

  document.getElementById('borrarTodo').addEventListener('click', () => {
    if (viajes.length === 0) return;
    if (confirm('¿Borrar todos los viajes registrados?')) {
      viajes = [];
      render();
      enviarASheets({ action: 'borrarTodo' });
    }
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const monto = document.getElementById('monto').value;
    const descripcion = document.getElementById('descripcion').value.trim();
    const fecha = fechaInput.value;

    if (!monto || Number(monto) <= 0) return;

    const nuevoViaje = {
      id: Date.now(),
      monto: Number(monto),
      descripcion,
      fecha,
      metodo: metodoSeleccionado
    };

    viajes.push(nuevoViaje);

    document.getElementById('monto').value = '';
    document.getElementById('descripcion').value = '';
    fechaInput.valueAsDate = new Date();

    render();
    enviarASheets(nuevoViaje);
  });

  cargarViajes();
</script>

</body>
</html>
